<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Physics 1 Derivation Engine</title>

  <!-- KaTeX for LaTeX rendering of derivation steps -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>Physics 1 — Derivation Engine</h1>
    <span class="subtitle">Symbolic, step-by-step solutions for AP-level kinematics, dynamics, and energy</span>
  </header>

  <main class="layout">
    <!-- ===================== LEFT: input panel ===================== -->
    <section class="panel input-panel">
      <div class="panel-header">
        <h2>Given</h2>
        <div class="preset-row">
          <label>Preset:</label>
          <select id="preset-select">
            <option value="">— choose —</option>
            <option value="free_fall">Free fall: find displacement</option>
            <option value="newton2">Newton's 2nd: find acceleration</option>
            <option value="ke">Kinetic energy from mass &amp; speed</option>
            <option value="chained_vf">Chained: m, F, vi, t → vf</option>
          </select>
        </div>
      </div>

      <div id="knowns-list" class="knowns-list"></div>
      <button id="add-known-btn" class="btn-secondary">+ Add known</button>

      <div class="target-row">
        <label for="target-select"><strong>Solve for:</strong></label>
        <select id="target-select"></select>
      </div>

      <button id="solve-btn" class="btn-primary">Solve</button>

      <div id="error-box" class="error-box" hidden></div>
    </section>

    <!-- ===================== RIGHT: derivation panel ===================== -->
    <section class="panel output-panel">
      <div class="panel-header">
        <h2>Derivation</h2>
        <span id="status-line" class="status-line">Awaiting input…</span>
      </div>

      <div id="result-summary" class="result-summary" hidden></div>
      <ol id="steps-list" class="steps-list"></ol>
      <div id="equations-used" class="equations-used" hidden></div>
    </section>
  </main>

  <footer class="footer">
    <span>Backend: <code id="api-status">http://localhost:8000</code></span>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
